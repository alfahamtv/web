<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfaham Web</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: url('https://h.top4top.io/p_3784nirj21.png') center / cover no-repeat fixed;
    min-height: 100vh;
}

.site-header {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 100000;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    background: rgba(0, 0, 0, 0.78);
    backdrop-filter: blur(14px);
    color: #fff;
}

.site-title {
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
}

.content-container {
    width: min(100%, 1400px);
    min-height: 100vh;
    padding: 94px 16px 40px;
    margin: 0 auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 110px);
    gap: 12px;
    justify-content: center;
    max-width: 1200px;
    margin: 0 auto;
}

.card {
    width: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px;
    gap: 2px;
    background-color: rgba(255, 255, 255, 0.92);
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
}

.card-figure {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
}

.card-figure img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.card-title {
    font-size: 11px;
    font-weight: 700;
    color: #000;
    text-align: center;
    padding: 4px 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
}

.card:hover {
    transform: scale(1.05);
}

.iframe-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 999999;
    display: none;
}

.iframe-overlay iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.iframe-overlay.show {
    display: block;
}
    </style>
</head>
<body>

<header class="site-header">
    <div class="site-title">Alfaham Web</div>
    <div style="width:48px;"></div>
</header>

<div class="content-container">
    <div class="grid" id="grid"></div>
</div>

<div class="iframe-overlay" id="iframeOverlay">
    <iframe id="externalIframe" src=""></iframe>
</div>

<script>
// ============================================================
// قائمة الروابط: كل موقع بثلاثة أسطر
// السطر الأول: اسم الموقع
// السطر الثاني: رابط الموقع
// السطر الثالث: رابط صورة الموقع
// ============================================================
const rawLinks = `
Alfaham Drama
https://alfahamtv.github.io/drama
https://raw.githubusercontent.com/h-80/img/refs/heads/main/Alfaham%20TV%20(1).png

Shahid Mosalsalat
https://play.shahidmosalsalat.me/category2.php
https://g.top4top.io/p_3744gowxh9.png

Movie Box
https://themoviebox.org/ar
https://i.top4top.io/p_37445da8v0.png

iQiyi
https://www.iq.com/?lang=en_us
https://b.top4top.io/p_3744emyil6.png

Arab Drama
https://www.arab-drama.me
https://l.top4top.io/p_3744lqel34.png

Shoof Max
https://shoofmax.com
https://a.top4top.io/p_374472wxl5.png



`;
// ============================================================

function parseLinks(text) {
    const lines = text.split('\n').filter(line => line.trim() !== '');
    const links = [];
    for (let i = 0; i < lines.length; i += 3) {
        if (lines[i] && lines[i+1] && lines[i+2]) {
            links.push({
                name: lines[i].trim(),
                url: lines[i+1].trim(),
                image: lines[i+2].trim()
            });
        }
    }
    return links;
}

function createCard(title, imgUrl, onClick) {
    const fallback = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23222%22/%3E%3Ctext x=%2250%25%22 y=%2255%25%22 font-family=%22Cairo%22 font-size=%2212%22 fill=%22%23fff%22 text-anchor=%22middle%22%3ENo Image%3C/text%3E%3C/svg%3E';
    
    const card = document.createElement('div');
    card.className = 'card';
    card.addEventListener('click', onClick);
    
    const figure = document.createElement('div');
    figure.className = 'card-figure';
    const img = document.createElement('img');
    img.src = imgUrl || fallback;
    img.alt = title;
    img.onerror = () => { img.src = fallback; };
    figure.appendChild(img);
    
    const titleEl = document.createElement('div');
    titleEl.className = 'card-title';
    titleEl.textContent = title;
    
    card.appendChild(figure);
    card.appendChild(titleEl);
    return card;
}

const overlay = document.getElementById('iframeOverlay');
const iframe = document.getElementById('externalIframe');

function openLink(url) {
    iframe.src = url;
    overlay.classList.add('show');
    history.pushState({ iframe: true }, '');
}

function closeIframe() {
    iframe.src = '';
    overlay.classList.remove('show');
}

window.addEventListener('popstate', function(e) {
    if (overlay.classList.contains('show')) {
        closeIframe();
    }
});

const links = parseLinks(rawLinks);
const grid = document.getElementById('grid');

links.forEach(link => {
    grid.appendChild(createCard(link.name, link.image, () => openLink(link.url)));
});
</script>
</body>
</html>
